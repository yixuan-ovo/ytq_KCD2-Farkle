name = "ytq-kcd2-farkle-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# 部署后在 Cloudflare 控制台绑定自定义域名，例如：
# farkle.yixr.uno → 此 Worker（/room/* 等 API 路由）

[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[vars]
PAGES_HOST = "kcd2-farkle.pages.dev"

[observability]
enabled = true
